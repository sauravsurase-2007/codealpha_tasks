<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — Lumière</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav>
  <a href="/" class="nav-brand">SS <span>Shopping Mall</span></a>
  <div class="nav-links">
    <a href="/">← Shop</a>
    <div id="auth-links"></div>
    <a href="/cart" style="padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);position:relative">
      🛒 Cart <span class="cart-badge" id="cart-badge" style="display:none">0</span>
    </a>
  </div>
</nav>

<div class="container page">
  <div class="section-header">
    <h2>My Orders</h2>
    <p>Track and manage your purchases</p>
  </div>
  <div id="orders-content">
    <div class="loading"><div class="spinner"></div><p>Loading your orders...</p></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  async function loadOrders() {
    const user = await getUser();
    if (!user) { window.location.href = '/login'; return; }

    const res = await fetch('/api/orders/my-orders', { credentials: 'include' });
    const orders = await res.json();
    const container = document.getElementById('orders-content');

    if (!orders.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📦</div>
          <h2>No orders yet</h2>
          <p>When you place orders, they'll appear here</p>
          <a href="/" class="btn btn-primary">Start Shopping</a>
        </div>`;
      return;
    }

    container.innerHTML = orders.map(order => `
      <div class="order-card">
        <div class="order-header">
          <div>
            <div class="order-id">Order #${order.id}</div>
            <div class="order-date">${formatDate(order.created_at)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <div style="text-align:right">
              <div style="font-size:12px;color:var(--text3)">Total</div>
              <div style="font-weight:700;color:var(--accent);font-size:18px">${formatPrice(order.total)}</div>
            </div>
            <span class="order-status status-${order.status}">${order.status}</span>
          </div>
        </div>
        <div class="order-items-list">
          ${order.items.map(item => `
            <div class="order-item-row">
              <img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/48x48/1a1a1a/666?text=?'"/>
              <div style="flex:1">
                <div style="font-weight:600;font-size:14px">${item.name}</div>
                <div style="font-size:12px;color:var(--text3)">Qty: ${item.quantity} × ${formatPrice(item.price)}</div>
              </div>
              <div style="font-weight:700">${formatPrice(item.price * item.quantity)}</div>
            </div>
          `).join('')}
        </div>
        <div class="order-total">
          <div>
            <span style="font-size:13px;color:var(--text2);font-weight:400">Payment: </span>
            <span style="font-size:14px">${order.payment_method}</span>
          </div>
          <span>Total: ${formatPrice(order.total)}</span>
        </div>
        ${order.shipping_address ? `
        <div style="padding:12px 24px;font-size:13px;color:var(--text3)">
          📍 Ships to: ${order.shipping_address}
        </div>` : ''}
      </div>
    `).join('');
  }

  loadOrders();
</script>
</body>
</html>
