<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Lumière</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav>
  <a href="/" class="nav-brand">SS <span>Shopping Mall</span></a>
  <div class="nav-links">
    <a href="/">← Home</a>
  </div>
</nav>

<div class="container page" style="min-height:80vh;display:flex;align-items:center;justify-content:center">
  <div style="width:100%;max-width:480px">
    <div class="form-card">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:36px;margin-bottom:8px">✦</div>
        <h2 class="form-title">Create account</h2>
        <p class="form-subtitle">Join Lumière and start shopping</p>
      </div>

      <div id="form-error" class="form-error"></div>

      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="first-name" placeholder="Jane" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="last-name" placeholder="Doe" />
        </div>
      </div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" />
      </div>

      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="tel" id="phone" placeholder="+1 (555) 000-0000" />
      </div>

      <div class="form-group">
        <label>Shipping Address (optional)</label>
        <input type="text" id="address" placeholder="123 Main St, City, State ZIP" />
      </div>

      <button class="btn btn-primary btn-full" style="padding:14px;font-size:15px;margin-top:4px" onclick="handleRegister()">
        Create Account →
      </button>

      <p class="form-link">Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  getUser().then(u => { if (u) window.location.href = '/'; });

  async function handleRegister() {
    const firstName = document.getElementById('first-name').value.trim();
    const lastName = document.getElementById('last-name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const phone = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const errEl = document.getElementById('form-error');
    errEl.style.display = 'none';

    if (!firstName || !email || !password) { errEl.textContent = 'Please fill in required fields'; errEl.style.display = 'block'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; errEl.style.display = 'block'; return; }

    const btn = document.querySelector('button');
    btn.disabled = true; btn.textContent = 'Creating account...';

    const res = await fetch('/api/auth/register', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: `${firstName} ${lastName}`.trim(), email, password, phone, address })
    });

    const data = await res.json();
    if (res.ok) {
      showToast(`Welcome to Lumière, ${firstName}! 🎉`);
      setTimeout(() => window.location.href = '/', 800);
    } else {
      errEl.textContent = data.error || 'Registration failed';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Create Account →';
    }
  }
</script>
</body>
</html>
