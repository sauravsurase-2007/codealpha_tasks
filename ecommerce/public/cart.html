<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Lumière</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav>
  <a href="/" class="nav-brand">SS <span>Shopping Mall</span></a>
  <div class="nav-links">
    <a href="/">← Shop</a>
    <div id="auth-links"></div>
  </div>
</nav>

<div class="container page">
  <div class="section-header">
    <h2>Shopping Cart</h2>
    <p id="item-count">Loading...</p>
  </div>
  <div id="cart-content">
    <div class="loading"><div class="spinner"></div><p>Loading your cart...</p></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  let cartItems = [];

  async function loadCart() {
    const user = await getUser();
    if (!user) {
      document.getElementById('cart-content').innerHTML = `
        <div class="empty-state">
          <div class="icon">🔐</div>
          <h2>Please log in</h2>
          <p>You need to be logged in to view your cart</p>
          <a href="/login" class="btn btn-primary">Login</a>
        </div>`;
      document.getElementById('item-count').textContent = '';
      return;
    }

    const res = await fetch('/api/cart', { credentials: 'include' });
    cartItems = await res.json();

    const count = cartItems.reduce((s, i) => s + i.quantity, 0);
    document.getElementById('item-count').textContent = count ? `${count} item${count !== 1 ? 's' : ''} in your cart` : '';

    if (!cartItems.length) {
      document.getElementById('cart-content').innerHTML = `
        <div class="empty-state">
          <div class="icon">🛒</div>
          <h2>Your cart is empty</h2>
          <p>Looks like you haven't added anything yet</p>
          <a href="/" class="btn btn-primary">Start Shopping</a>
        </div>`;
      return;
    }

    const subtotal = cartItems.reduce((s, i) => s + i.price * i.quantity, 0);
    const shipping = subtotal >= 50 ? 0 : 5.99;
    const total = subtotal + shipping;

    document.getElementById('cart-content').innerHTML = `
      <div class="cart-layout">
        <div id="cart-items">${renderItems()}</div>
        <div class="order-summary">
          <h3>Order Summary</h3>
          <div class="summary-line"><span>Subtotal</span><span>${formatPrice(subtotal)}</span></div>
          <div class="summary-line"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:var(--green)">Free</span>' : formatPrice(shipping)}</span></div>
          ${shipping > 0 ? `<div style="font-size:12px;color:var(--text3);margin-bottom:12px">Add ${formatPrice(50 - subtotal)} more for free shipping</div>` : ''}
          <div class="summary-line total"><span>Total</span><span>${formatPrice(total)}</span></div>
          <a href="/checkout" class="btn btn-primary btn-full" style="margin-top:16px">Proceed to Checkout →</a>
          <a href="/" class="btn btn-outline btn-full" style="margin-top:8px">Continue Shopping</a>
        </div>
      </div>`;
  }

  function renderItems() {
    return cartItems.map(item => `
      <div class="cart-item" id="cart-item-${item.id}">
        <img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/80x80/1a1a1a/666?text=?'"/>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${formatPrice(item.price)}</div>
          <div class="qty-control">
            <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity - 1})">−</button>
            <span class="qty-val">${item.quantity}</span>
            <button class="qty-btn" onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:700;margin-bottom:8px">${formatPrice(item.price * item.quantity)}</div>
          <button class="remove-btn" onclick="removeItem(${item.id})">🗑</button>
        </div>
      </div>
    `).join('');
  }

  async function updateQty(id, qty) {
    await fetch(`/api/cart/update/${id}`, {
      method: 'PUT', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ quantity: qty })
    });
    loadCart();
  }

  async function removeItem(id) {
    await fetch(`/api/cart/remove/${id}`, { method: 'DELETE', credentials: 'include' });
    showToast('Item removed');
    loadCart();
  }

  loadCart();
</script>
</body>
</html>
