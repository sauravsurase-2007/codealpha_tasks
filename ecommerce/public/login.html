<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Lumière</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav>
  <a href="/" class="nav-brand">SS <span>Shopping Mall</span></a>
  <div class="nav-links">
    <a href="/">← Home</a>
  </div>
</nav>

<div class="container page" style="min-height:80vh;display:flex;align-items:center;justify-content:center">
  <div style="width:100%;max-width:440px">
    <div class="form-card">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:36px;margin-bottom:8px">✦</div>
        <h2 class="form-title">Welcome back</h2>
        <p class="form-subtitle">Sign in to your Lumière account</p>
      </div>

      <div id="form-error" class="form-error"></div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-full" style="padding:14px;font-size:15px;margin-top:8px" onclick="handleLogin()">
        Sign In →
      </button>

      <p class="form-link">Don't have an account? <a href="/register">Create one</a></p>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  // If already logged in, redirect
  getUser().then(u => { if (u) window.location.href = '/'; });

  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  });

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('form-error');
    errEl.style.display = 'none';

    if (!email || !password) { errEl.textContent = 'Please fill in all fields'; errEl.style.display = 'block'; return; }

    const btn = document.querySelector('button');
    btn.disabled = true; btn.textContent = 'Signing in...';

    const res = await fetch('/api/auth/login', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (res.ok) {
      showToast(`Welcome back, ${data.user.name.split(' ')[0]}! 🎉`);
      setTimeout(() => window.location.href = '/', 800);
    } else {
      errEl.textContent = data.error || 'Login failed';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  }
</script>
</body>
</html>
