<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumière — Premium Store</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav>
  <a href="/" class="nav-brand">SS <span>Shopping Mall</span></a>
  <div class="nav-links">
    <div id="auth-links"></div>
    <a href="/cart" class="btn-cart" style="padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;position:relative">
      🛒 <span>Cart</span>
      <span class="cart-badge" id="cart-badge" style="display:none">0</span>
    </a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="container">
    <div class="hero-content">
      <div class="hero-tag">✦ New Season Collection</div>
      <h1>Curated goods for <span>refined</span> living</h1>
      <p>Discover handpicked products where quality meets design. Free shipping on orders over $50.</p>
      <div class="hero-btns">
        <a href="#products" class="btn btn-primary">Shop Now →</a>
        <a href="#products" class="btn btn-outline">View All</a>
      </div>
    </div>
  </div>
</section>

<!-- Products -->
<div class="container page" id="products">
  <div class="section-header">
    <h2>Our Collection</h2>
    <p>Thoughtfully selected for you</p>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="search-input" placeholder="Search products..." />
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-chip active" data-cat="all">All</button>
    <button class="filter-chip" data-cat="Electronics">Electronics</button>
    <button class="filter-chip" data-cat="Fashion">Fashion</button>
    <button class="filter-chip" data-cat="Kitchen">Kitchen</button>
    <button class="filter-chip" data-cat="Sports">Sports</button>
    <button class="filter-chip" data-cat="Home">Home</button>
    <select class="filter-select" id="sort-select">
      <option value="">Sort: Featured</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
      <option value="rating">Top Rated</option>
    </select>
  </div>

  <!-- Grid -->
  <div class="products-grid" id="products-grid">
    <div class="loading"><div class="spinner"></div><p>Loading products...</p></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  let currentCat = 'all', currentSort = '', searchTimer;

  async function loadProducts() {
    const search = document.getElementById('search-input').value.trim();
    const params = new URLSearchParams();
    if (currentCat !== 'all') params.set('category', currentCat);
    if (currentSort) params.set('sort', currentSort);
    if (search) params.set('search', search);

    const res = await fetch('/api/products?' + params);
    const products = await res.json();
    const grid = document.getElementById('products-grid');

    if (!products.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><h2>No products found</h2><p>Try a different search or category</p></div>`;
      return;
    }

    grid.innerHTML = products.map(p => `
      <div class="product-card" onclick="window.location='/product/${p.id}'">
        <div class="product-img">
          <img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x400/1a1a1a/666?text=Product'"/>
          ${p.badge ? `<div class="product-badge">${p.badge}</div>` : ''}
        </div>
        <div class="product-info">
          <div class="product-category">${p.category}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-rating">
            <span class="stars">${renderStars(p.rating)}</span>
            <span class="rating-count">(${p.reviews.toLocaleString()})</span>
          </div>
          <div class="product-price">
            <span class="price-now">${formatPrice(p.price)}</span>
            ${p.original_price ? `<span class="price-old">${formatPrice(p.original_price)}</span>` : ''}
          </div>
          <div class="product-actions">
            <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();window.location='/product/${p.id}'">Details</button>
            <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();addToCart(${p.id})">+ Cart</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // Category filter
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentCat = chip.dataset.cat;
      loadProducts();
    });
  });

  // Sort
  document.getElementById('sort-select').addEventListener('change', e => {
    currentSort = e.target.value; loadProducts();
  });

  // Search (debounced)
  document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadProducts, 350);
  });

  loadProducts();
</script>
</body>
</html>
